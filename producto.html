<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle del producto</title>
  <link rel="stylesheet" href="styleproductos.css" />
</head>
<body>

  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo">
      <img src="img/logomaxicompras.png" alt="MaxiCompras" />
    </div>
    <div class="icons">
      <img src="./img/search.png" alt="Buscar" />
      <img src="./img/cart.png" alt="Carrito" />
    </div>
  </header>

  <!-- Contenedor del producto -->
  <section class="producto-container">
    <div class="producto-imagen">
      <img id="imagen-producto" src="" alt="Producto" />
      <div class="miniaturas" id="miniaturas"></div>
    </div>
    <div class="producto-detalles">
      <h1 id="nombre-producto"></h1>
      <div class="estrellas">★★★★★ (5)</div>
      <div>
        <span id="precio-anterior" class="precio-original"></span>
        <span id="precio-actual" class="precio-descuento"></span>
        <span id="descuento" class="badge-descuento"></span>
      </div>

      <div class="confianza-box">
        <h4>Tienda Líder Platinum</h4>
        <p>+40.000 ventas | Entrega rápida | Excelente servicio</p>
      </div>

      <div class="botones">
        <button class="btn-carrito">Añadir al carrito</button>
        <a id="btn-comprar" class="btn-comprar">Comprar ahora</a>
      </div>
    </div>
  </section>

  <!-- Descripción -->
  <section class="producto-descripcion">
    <h2>Descripción del producto</h2>
    <div id="descripcion-producto"></div>
  </section>

  <!-- Te podría interesar -->
  <section class="relacionados">
    <h3>Te podría interesar</h3>
    <div class="grid-relacionados" id="relacionados"></div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025, MaxiCompras | <a href="index.html">Volver al inicio</a></p>
  </footer>

  <!-- Script -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    fetch("productos.json")
      .then(res => res.json())
      .then(productos => {
        const producto = productos.find(p => p.slug === slug);
        if (!producto) {
          document.querySelector(".producto-container").innerHTML = "<p>Producto no encontrado.</p>";
          return;
        }

        const { imagenes, nombre, precio, descripcion } = producto;
        const precioAnterior = producto.precio_anterior || Math.round(precio * 1.5);
        const descuento = Math.round(100 - (precio / precioAnterior) * 100);

        document.getElementById("imagen-producto").src = imagenes[0];
        document.getElementById("nombre-producto").textContent = nombre;
        document.getElementById("precio-anterior").textContent = "$" + precioAnterior.toLocaleString('es-CO');
        document.getElementById("precio-actual").textContent = "$" + precio.toLocaleString('es-CO');
        document.getElementById("descuento").textContent = `Ahorra ${descuento}%`;
        document.getElementById("descripcion-producto").innerHTML = descripcion;

        const miniaturas = document.getElementById("miniaturas");
        imagenes.forEach(img => {
          const mini = document.createElement("img");
          mini.src = img;
          mini.onclick = () => {
            document.getElementById("imagen-producto").src = img;
          };
          miniaturas.appendChild(mini);
        });

        // Añadir al carrito
        document.querySelector(".btn-carrito").addEventListener("click", () => {
          const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
          const item = {
            slug: producto.slug,
            nombre: producto.nombre,
            imagen: producto.imagenes[0],
            precio: producto.precio,
            cantidad: 1
          };
          const existente = carrito.find(p => p.slug === item.slug);
          if (existente) {
            existente.cantidad += 1;
          } else {
            carrito.push(item);
          }
          localStorage.setItem("carrito", JSON.stringify(carrito));
          alert("✅ Producto añadido al carrito");
        });

        // Comprar ahora
        document.getElementById("btn-comprar").addEventListener("click", () => {
          const url = `formulario.html?producto=${encodeURIComponent(nombre)}&precio=${encodeURIComponent(precio.toLocaleString('es-CO'))}`;
          window.location.href = url;
        });

        // Mostrar productos aleatorios
        const relacionadosContainer = document.getElementById("relacionados");
        const otros = productos.filter(p => p.slug !== slug);
        const seleccionados = otros.sort(() => 0.5 - Math.random()).slice(0, 5);

        seleccionados.forEach(p => {
          const item = document.createElement("div");
          item.className = "relacionado-item";
          item.innerHTML = `
            <a href="producto.html?slug=${p.slug}">
              <img src="${p.imagenes[0]}" alt="${p.nombre}" />
              <p>${p.nombre}</p>
              <p style="font-weight: bold; color:#0055ff;">$${p.precio.toLocaleString('es-CO')}</p>
            </a>
          `;
          relacionadosContainer.appendChild(item);
        });
      });
  </script>
</body>
</html>
