<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle del producto</title>
  <link rel="icon" href="img/logomaxicompras.webp" type="image/webp">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styleproductos.css" />
</head>
<body>
<!-- Barra superior -->
<div class="top-bar">
  <span><img src="img/camion.webp" alt="Envío" class="icono"> Envío Gratis a todo Colombia</span>
  <span><img src="img/telefono.webp" alt="WhatsApp" class="icono"> Asesoramiento vía Whatsapp</span>
  <span><img src="img/importadores.webp" alt="Calidad" class="icono"> Somos Importadores</span>
</div>

<!-- Encabezado -->
<header class="main-header">
  <a href="index.html">
    <div class="logo">
      <img src="img/logomaxicompras.webp" alt="Logo MaxiCompras" />
    </div>
  </a>
  <div class="icons">
    <img src="img/search.webp" alt="Buscar" />
    <div class="carrito-icono">
      <img src="img/cart.webp" alt="Carrito" />
      <span class="contador-carrito" id="contadorCarrito"></span>
    </div>
  </div>
</header>

<!-- 🔸 Producto -->
<section class="producto-container">
  <div class="producto-imagen">
    <img id="imagen-principal" src="" alt="Producto principal" />
    <div id="miniaturas" class="miniaturas"></div>
  </div>

  <div class="producto-detalles">
    <h1 id="nombre-producto"></h1>
    <div class="estrellas">★★★★★ (5)</div>
    <div class="precios">
      <span id="precio-anterior" class="precio-original"></span>
      <span id="precio-actual" class="precio-descuento"></span>
      <span id="descuento" class="badge-descuento"></span>
    </div>

    <div class="confianza-box">
      <h4>Tienda Líder Platinum</h4>
      <p>+40.000 ventas | Entrega rápida | Excelente servicio</p>
    </div>

    <div class="botones">
      <button class="btn-carrito">Añadir al carrito</button>
      <a id="btn-comprar" class="btn-comprar">Comprar ahora</a>
    </div>
  </div>
</section>

<!-- 🔹 Descripción -->
<section class="producto-descripcion">
  <h2>Descripción</h2>
  <div id="descripcion-producto"></div>
</section>

<!-- 🔻 Script: Producto -->
<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("slug");

  // Si no hay slug, redirigir a all.html
if (!slug) {
  window.location.href = "all.html";
}

  fetch("productos.json")
    .then(res => res.json())
    .then(productos => {
      const producto = productos.find(p => p.slug === slug);
      if (!producto) return;
      // 🔻 Metatags dinámicos
const metaTitle = document.querySelector("title");
metaTitle.textContent = producto.nombre + " | MaxiCompras";

const metaDesc = document.createElement("meta");
metaDesc.name = "description";
metaDesc.content = producto.descripcion.replace(/<[^>]+>/g, "").slice(0, 150);
document.head.appendChild(metaDesc);

const ogTitle = document.createElement("meta");
ogTitle.setAttribute("property", "og:title");
ogTitle.content = producto.nombre + " | MaxiCompras";
document.head.appendChild(ogTitle);

const ogDesc = document.createElement("meta");
ogDesc.setAttribute("property", "og:description");
ogDesc.content = producto.descripcion.replace(/<[^>]+>/g, "").slice(0, 150);
document.head.appendChild(ogDesc);

const ogImg = document.createElement("meta");
ogImg.setAttribute("property", "og:image");
ogImg.content = producto.imagenes[0];
document.head.appendChild(ogImg);

const ogUrl = document.createElement("meta");
ogUrl.setAttribute("property", "og:url");
ogUrl.content = window.location.href;
document.head.appendChild(ogUrl);

      const { imagenes, nombre, precio, descripcion } = producto;
      const precioAnterior = producto.precio_anterior || Math.round(precio * 1.5);
      const descuento = Math.round(100 - (precio / precioAnterior) * 100);

      document.getElementById("imagen-principal").src = imagenes[0];
      document.getElementById("nombre-producto").textContent = nombre;
      document.getElementById("precio-anterior").textContent = "$" + precioAnterior.toLocaleString("es-CO");
      document.getElementById("precio-actual").textContent = "$" + precio.toLocaleString("es-CO");
      document.getElementById("descuento").textContent = `Ahorra ${descuento}%`;
      document.getElementById("descripcion-producto").innerHTML = descripcion;

      const miniaturas = document.getElementById("miniaturas");
      imagenes.forEach(img => {
        const mini = document.createElement("img");
        mini.src = img;
        mini.onclick = () => {
          document.getElementById("imagen-principal").src = img;
        };
        mini.classList.add("miniatura");
        miniaturas.appendChild(mini);
      });

      document.querySelector(".btn-carrito").addEventListener("click", () => {
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        const existente = carrito.find(p => p.slug === producto.slug);
        if (existente) {
          existente.cantidad += 1;
        } else {
          carrito.push({
            slug: producto.slug,
            nombre,
            imagen: imagenes[0],
            precio,
            cantidad: 1
          });
        }
        localStorage.setItem("carrito", JSON.stringify(carrito));
        const mensaje = document.getElementById("mensaje-carrito");
        mensaje.classList.add("mostrar");
        setTimeout(() => {
          mensaje.classList.remove("mostrar");
        }, 3000);
        actualizarContadorCarrito();
      });

      document.getElementById("btn-comprar").addEventListener("click", () => {
        const url = `formulario.html?producto=${encodeURIComponent(nombre)}&precio=${encodeURIComponent(precio.toLocaleString('es-CO'))}`;
        window.location.href = url;
      });
    });
</script>

<!-- 🔻 Script: top-bar móvil -->
<script>
  const mensajes = document.querySelectorAll('.top-bar span');
  let actual = 0;

  function mostrarMensaje() {
    mensajes.forEach((msg, i) => {
      msg.classList.toggle('activo', i === actual);
    });
    actual = (actual + 1) % mensajes.length;
  }

  if (window.innerWidth <= 768) {
    mostrarMensaje();
    setInterval(mostrarMensaje, 4000);
  }
</script>

<div id="mensaje-carrito" class="mensaje-flotante">Producto añadido al carrito</div>

<!-- 🔹 MODAL DE BÚSQUEDA -->
<div id="modal-busqueda" class="modal-busqueda oculto">
  <div class="contenido-busqueda">
    <button id="cerrar-busqueda" class="cerrar">✖</button>
    <input type="text" id="input-modal" placeholder="Buscar producto..." />
    <div id="resultados-modal" class="grid-productos"></div>
  </div>
</div>

<!-- 🔹 MINI CARRITO -->
<div id="mini-carrito" class="modal-carrito oculto">
  <div class="contenido-carrito">
    <h2>🛒 Tu Carrito</h2>
    <div id="mini-carrito-items"></div>
    <div class="mini-carrito-footer">
      <button onclick="window.location.href='cart.html'" class="btn-ir-carrito">Ir al carrito</button>
    </div>
  </div>
</div>
<div id="fondo-oscuro-carrito" class="fondo-oscuro oculto"></div>

<!-- 🔻 Script: Buscador -->
<script>
  const modal = document.getElementById("modal-busqueda");
  const abrirModal = document.querySelector('img[alt="Buscar"]');
  const cerrarModal = document.getElementById("cerrar-busqueda");
  const inputModal = document.getElementById("input-modal");
  const resultadosModal = document.getElementById("resultados-modal");

  let productosCargados = [];

  fetch("productos.json")
    .then(res => res.json())
    .then(productos => {
      productosCargados = productos;
    });

  abrirModal.addEventListener("click", () => {
    modal.classList.remove("oculto");
    inputModal.focus();
  });

  cerrarModal.addEventListener("click", () => {
    modal.classList.add("oculto");
    inputModal.value = "";
    resultadosModal.innerHTML = "";
  });

  inputModal.addEventListener("input", () => {
    const texto = inputModal.value.toLowerCase();
    resultadosModal.innerHTML = "";

    const filtrados = productosCargados.filter(p =>
      p.nombre.toLowerCase().includes(texto)
    );

    if (filtrados.length === 0) {
      resultadosModal.innerHTML = "<p>No se encontraron productos.</p>";
      return;
    }

    filtrados.forEach(producto => {
      const div = document.createElement("div");
      div.className = "producto-card";
      const precioAnterior = producto.precio_anterior || Math.round(producto.precio * 1.5);
      const descuento = Math.round(100 - (producto.precio / precioAnterior) * 100);

      div.innerHTML = `
        <a href="producto.html?slug=${producto.slug}">
          <div class="etiqueta-descuento">↓ Ahorrar ${descuento}%</div>
          <img src="${producto.imagenes[0]}" alt="${producto.nombre}" class="producto-img" />
          <h3 class="nombre-producto">${producto.nombre}</h3>
          <div class="precio">
            <span class="precio-actual">$${producto.precio.toLocaleString('es-CO')}</span>
            <span class="precio-anterior">$${precioAnterior.toLocaleString('es-CO')}</span>
          </div>
          <div class="estrellas">★★★★★ <span class="valoracion">(5)</span></div>
        </a>
      `;
      resultadosModal.appendChild(div);
    });
  });
</script>

<!-- 🔻 Script: Mini carrito -->
<script>
  const iconoCarrito = document.querySelector('img[alt="Carrito"]');
  const miniCarrito = document.getElementById("mini-carrito");
  const fondoCarrito = document.getElementById("fondo-oscuro-carrito");
  const contenedorMini = document.getElementById("mini-carrito-items");

  iconoCarrito.addEventListener("click", () => {
    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    contenedorMini.innerHTML = "";

    if (carrito.length === 0) {
      contenedorMini.innerHTML = "<p>🛍️ Tu carrito está vacío.</p>";
    } else {
      carrito.forEach(producto => {
        const div = document.createElement("div");
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;">
            <img src="${producto.imagen}" alt="" style="width:50px;height:50px;object-fit:cover;border-radius:5px;">
            <div>
              <p style="margin:0;">${producto.nombre}</p>
              <small>$${producto.precio.toLocaleString('es-CO')} x ${producto.cantidad}</small>
            </div>
          </div>`;
        contenedorMini.appendChild(div);
      });
    }

    miniCarrito.classList.remove("oculto");
    fondoCarrito.classList.remove("oculto");
  });

  fondoCarrito.addEventListener("click", () => {
    miniCarrito.classList.add("oculto");
    fondoCarrito.classList.add("oculto");
  });
</script>

<!-- 🔻 Script: Contador de carrito -->
<script>
  function actualizarContadorCarrito() {
    const contador = document.getElementById("contadorCarrito");
    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    const total = carrito.reduce((acc, prod) => acc + prod.cantidad, 0);

    if (total > 0) {
      contador.textContent = total;
      contador.style.display = "inline-block";
    } else {
      contador.style.display = "none";
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    actualizarContadorCarrito();
  });
</script>

<div id="whatsapp"></div>
<script>
  fetch("whatsapp.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("whatsapp").innerHTML = html;
    });
</script>

</body>
</html>
