<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="stylecart.css" />
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">
    <span><img src="img/camion.png" alt="Envío" class="icono"> Envío Gratis a todo Colombia</span>
    <span><img src="img/telefono.png" alt="WhatsApp" class="icono"> Asesoramiento via Whatsapp</span>
    <span><img src="img/importadores.png" alt="Calidad" class="icono"> Somos Importadores</span>
  </div>

  <!-- Encabezado -->
  <header class="header-cart">
    <div class="titulo-carrito">Tu carrito</div>
  </header>

  <!-- Contenido del carrito -->
  <main class="cart-container">
    <div id="carrito-lista" class="carrito-lista"></div>

    <div class="carrito-resumen">
      <p><strong>Total estimado</strong> <span id="subtotal">$0 COP</span></p>
      <p class="nota">Impuestos, descuentos y envío calculados en la pantalla de pago.</p>
      <div class="acciones-carrito">
        <a href="index.html" class="btn-seguir">Seguir comprando</a>
        <button class="btn-finalizar">Pagar pedido</button>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script>
    function renderCarrito() {
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      const lista = document.getElementById("carrito-lista");
      const subtotalDOM = document.getElementById("subtotal");
      lista.innerHTML = "";

      if (carrito.length === 0) {
        lista.innerHTML = "<p class='vacio'>Tu carrito está vacío 😢</p>";
        subtotalDOM.textContent = "$0";
        return;
      }

      let subtotal = 0;

      carrito.forEach((producto, index) => {
        subtotal += producto.precio * producto.cantidad;

        const item = document.createElement("div");
        item.className = "item-carrito";
        item.innerHTML = `
          <img src="${producto.imagen}" class="mini-img" alt="${producto.nombre}" />
          <div class="info">
            <h3>${producto.nombre}</h3>
            <p class="precio">$${producto.precio.toLocaleString('es-CO')}</p>
            <div class="acciones">
              <button onclick="cambiarCantidad(${index}, -1)">−</button>
              <span>${producto.cantidad}</span>
              <button onclick="cambiarCantidad(${index}, 1)">+</button>
              <button class="eliminar" onclick="eliminarProducto(${index})">🗑</button>
            </div>
          </div>
        `;
        lista.appendChild(item);
      });

      subtotalDOM.textContent = "$" + subtotal.toLocaleString("es-CO") + " COP";
    }

    function cambiarCantidad(index, cambio) {
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      carrito[index].cantidad += cambio;
      if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      renderCarrito();
    }

    function eliminarProducto(index) {
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      carrito.splice(index, 1);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      renderCarrito();
    }

    document.querySelector(".btn-finalizar").addEventListener("click", () => {
      if (confirm("¿Quieres finalizar tu compra?")) {
        window.location.href = "formulario.html";
      }
    });

    renderCarrito();
  </script>

  <script>
    // Top bar móvil
    if (window.innerWidth <= 768) {
      const spans = document.querySelectorAll(".top-bar span");
      let i = 0;
      spans[i].classList.add("activo");
      setInterval(() => {
        spans[i].classList.remove("activo");
        i = (i + 1) % spans.length;
        spans[i].classList.add("activo");
      }, 4000);
    }
  </script>

</body>
</html>
