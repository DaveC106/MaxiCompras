<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="stylecart.css" />
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">
    <span><img src="img/camion.webp" alt="Envío" class="icono"> Envío Gratis a todo Colombia</span>
    <span><img src="img/telefono.webp" alt="WhatsApp" class="icono"> Asesoramiento via Whatsapp</span>
    <span><img src="img/importadores.webp" alt="Calidad" class="icono"> Somos Importadores</span>
  </div>

  <!-- Encabezado -->
  <header class="main-header">
     <a href="index.html">
    <div class="logo">
      <img src="img/logomaxicompras.webp" alt="Logo MaxiCompras" />
    </div>
  </a>
    <div class="icons">
      <img src="./img/search.webp" alt="Buscar" />
    </div>
  </header>

  <!-- Contenido del carrito -->
  <main class="cart-container">
    <div id="carrito-lista" class="carrito-lista"></div>

    <div class="carrito-resumen">
      <p><strong>Total estimado</strong> <span id="subtotal">$0 COP</span></p>
      <p class="nota">Impuestos, descuentos y envío calculados en la pantalla de pago.</p>
      <div class="acciones-carrito">
        <a href="all.html" class="btn-seguir">Seguir comprando</a>
        <button class="btn-finalizar" id="btn-finalizar" disabled>Pagar pedido</button>
        <div id="mensaje-carrito" class="mensaje-oculto">Agrega productos al carrito para continuar</div>
      </div>
    </div>
  </main>

  <!-- Modal de Confirmación -->
  <div id="modal-confirmacion" class="modal">
    <div class="modal-contenido">
      <p>¿Quieres finalizar tu compra?</p>
      <div class="modal-botones">
        <button id="btn-cancelar">Cancelar</button>
        <button id="btn-confirmar">Sí, finalizar</button>
      </div>
    </div>
  </div>

  <!-- Modal Busqueda -->
  <div id="modal-busqueda" class="modal-busqueda oculto">
    <div class="contenido-busqueda">
      <button id="cerrar-busqueda" class="cerrar">✖</button>
      <input type="text" id="input-modal" placeholder="Buscar producto..." />
      <div id="resultados-modal" class="grid-productos"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const modal = document.getElementById("modal-confirmacion");
      const btnCancelar = document.getElementById("btn-cancelar");
      const btnConfirmar = document.getElementById("btn-confirmar");
      const mensaje = document.getElementById("mensaje-carrito");
      const btnFinalizar = document.getElementById("btn-finalizar");
      let finalizarListener;

      btnCancelar.addEventListener("click", () => {
        modal.style.display = "none";
      });

      btnConfirmar.addEventListener("click", () => {
        window.location.href = "formulario.html";
      });

      function renderCarrito() {
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        const lista = document.getElementById("carrito-lista");
        const subtotalDOM = document.getElementById("subtotal");
        lista.innerHTML = "";

        if (carrito.length === 0) {
          lista.innerHTML = "<p class='vacio'>Tu carrito está vacío</p>";
          subtotalDOM.textContent = "$0";
        } else {
          let subtotal = 0;
          carrito.forEach((producto, index) => {
            subtotal += producto.precio * producto.cantidad;
            const item = document.createElement("div");
            item.className = "item-carrito";
            item.innerHTML = `
              <img src="${producto.imagen}" class="mini-img" alt="${producto.nombre}" />
              <div class="info">
                <h3>${producto.nombre}</h3>
                <p class="precio">$${producto.precio.toLocaleString('es-CO')}</p>
                <div class="acciones">
                  <button onclick="cambiarCantidad(${index}, -1)">−</button>
                  <span>${producto.cantidad}</span>
                  <button onclick="cambiarCantidad(${index}, 1)">+</button>
                  <button class="eliminar" onclick="eliminarProducto(${index})">🗑</button>
                </div>
              </div>
            `;
            lista.appendChild(item);
          });
          subtotalDOM.textContent = "$" + subtotal.toLocaleString("es-CO") + " COP";
        }

        actualizarEstadoBoton();
      }

      function actualizarEstadoBoton() {
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

        if (finalizarListener) {
          btnFinalizar.removeEventListener("click", finalizarListener);
        }

        if (carrito.length === 0) {
          btnFinalizar.disabled = true;
          btnFinalizar.style.opacity = "0.5";
          finalizarListener = function (e) {
            e.preventDefault();
            mensaje.style.display = "block";
            setTimeout(() => mensaje.style.display = "none", 3000);
          };
        } else {
          btnFinalizar.disabled = false;
          btnFinalizar.style.opacity = "1";
          finalizarListener = function () {
            modal.style.display = "flex";
          };
        }

        btnFinalizar.addEventListener("click", finalizarListener);
      }

      window.cambiarCantidad = function(index, cambio) {
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        carrito[index].cantidad += cambio;
        if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
        localStorage.setItem("carrito", JSON.stringify(carrito));
        renderCarrito();
      }

      window.eliminarProducto = function(index) {
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        carrito.splice(index, 1);
        localStorage.setItem("carrito", JSON.stringify(carrito));
        renderCarrito();
      }

      renderCarrito();

      // Modal buscador
      const modalBusqueda = document.getElementById("modal-busqueda");
      const abrirModal = document.querySelector('img[alt="Buscar"]');
      const cerrarModal = document.getElementById("cerrar-busqueda");
      const inputModal = document.getElementById("input-modal");
      const resultadosModal = document.getElementById("resultados-modal");

      let productosCargados = [];

      fetch("productos.json")
        .then(res => res.json())
        .then(productos => productosCargados = productos);

      abrirModal.addEventListener("click", () => {
        modalBusqueda.classList.remove("oculto");
        inputModal.focus();
      });

      cerrarModal.addEventListener("click", () => {
        modalBusqueda.classList.add("oculto");
        inputModal.value = "";
        resultadosModal.innerHTML = "";
      });

      inputModal.addEventListener("input", () => {
        const texto = inputModal.value.toLowerCase();
        resultadosModal.innerHTML = "";

        const filtrados = productosCargados.filter(p =>
          p.nombre.toLowerCase().includes(texto)
        );

        if (filtrados.length === 0) {
          resultadosModal.innerHTML = "<p>No se encontraron productos.</p>";
          return;
        }

        filtrados.forEach(producto => {
          const precioAnterior = producto.precio_anterior || Math.round(producto.precio * 1.5);
          const descuento = Math.round(100 - (producto.precio / precioAnterior) * 100);

          const div = document.createElement("div");
          div.className = "producto-card";
          div.innerHTML = `
            <a href="producto.html?slug=${producto.slug}">
              <div class="etiqueta-descuento">↓ Ahorrar ${descuento}%</div>
              <img src="${producto.imagenes[0]}" alt="${producto.nombre}" class="producto-img" />
              <h3 class="nombre-producto">${producto.nombre}</h3>
              <div class="precio">
                <span class="precio-actual">$${producto.precio.toLocaleString('es-CO')}</span>
                <span class="precio-anterior">$${precioAnterior.toLocaleString('es-CO')}</span>
              </div>
              <div class="estrellas">★★★★★ <span class="valoracion">(5)</span></div>
            </a>
          `;
          resultadosModal.appendChild(div);
        });
      });
    });
  </script>
</body>
</html>
