<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Compra</title>
  <link rel="stylesheet" href="styleform.css" />
  <style>
    button[type="submit"] {
      margin-top: 20px;
      background: #28a745;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <!-- Barra superior -->
  <div class="top-bar">
    <span><img src="img/camion.png" alt="Envío" class="icono"> Envío Gratis a todo Colombia</span>
    <span><img src="img/telefono.png" alt="WhatsApp" class="icono"> Asesoramiento vía Whatsapp</span>
    <span><img src="img/importadores.png" alt="Calidad" class="icono"> Somos Importadores</span>
  </div>

  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo">
      <h1>MaxiCompras</h1>
    </div>
    <div class="icons">
      <img src="./img/search.png" alt="Buscar" />
      <a href="cart.html"><img src="./img/cart.png" alt="Carrito" /></a>
    </div>
  </header>

  <div class="form-container">
    <h2>Finaliza tu compra</h2>
    <form id="pedidoForm" action="https://formsubmit.co/ventasmaxikompras@gmail.com" method="POST">
      
      <!-- Sección 1: Contacto -->
      <h3>1. Contacto</h3>

      <label for="email">Correo electrónico *</label>
      <input type="email" id="email" name="CorreoElectronico" required>

      <label for="telefono">Número Teléfono *</label>
      <input type="tel" id="telefono" name="Telefono" required>

      <label for="telefono_confirmar">Confirmar Teléfono *</label>
      <input type="tel" id="telefono_confirmar" name="ConfirmarTelefono" required>

      <!-- Sección 2: Entrega -->
      <h3>2. Entrega</h3>

      <label for="nombre">Nombre *</label>
      <input type="text" id="nombre" name="Nombre" required>

      <label for="apellido">Apellido *</label>
      <input type="text" id="apellido" name="Apellido" required>

      <label for="pais">País *</label>
      <select id="pais" name="Pais" required>
        <option value="">Seleccione...</option>
        <option value="Colombia">Colombia</option>
      </select>

      <label for="estado">Estado / Región *</label>
      <input type="text" id="estado" name="EstadoRegion" required>

      <label for="ciudad">Ciudad *</label>
      <input type="text" id="ciudad" name="Ciudad" required>

      <label for="direccion">Dirección *</label>
      <input type="text" id="direccion" name="Direccion" required>

      <label for="apartamento">Apartamento / Casa (opcional)</label>
      <input type="text" id="apartamento" name="ApartamentoCasa">

      <label for="ccnit">CC o NIT *</label>
      <input type="text" id="ccnit" name="CCoNIT" required>

      <label for="facturacionIgual">
        <input type="checkbox" id="facturacionIgual" name="FacturacionIgualEnvio" checked>
        Dirección de Facturación igual a la de Envío
      </label>

      <!-- Productos (desde URL o carrito) -->
      <div id="productos-container">
        <label for="producto">Producto</label>
        <input type="text" id="producto" name="Producto" readonly>

        <label for="precio">Precio</label>
        <input type="text" id="precio" name="Precio" readonly>
      </div>

      <!-- Total (si es del carrito) -->
      <div id="total-container" style="display:none;">
        <label for="total">Total</label>
        <input type="text" id="total" name="Total" readonly>
      </div>

      <!-- Sección 3: Pago -->
      <h3>3. Pago</h3>

      <label>
        <input type="radio" name="MetodoPago" value="Contraentrega" checked> Pago Contraentrega
      </label><br>

      <!-- Configuración FormSubmit -->
      <input type="hidden" name="_next" value="https://maxicomprass.store">
      <input type="hidden" name="_captcha" value="false">

      <button type="submit">Enviar Pedido</button>
    </form>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const producto = urlParams.get("producto");
    const precio = urlParams.get("precio");

    const productoInput = document.getElementById("producto");
    const precioInput = document.getElementById("precio");
    const productosContainer = document.getElementById("productos-container");
    const totalContainer = document.getElementById("total-container");
    const totalInput = document.getElementById("total");

    if (producto && precio) {
      // Caso: "Comprar ahora" con 1 producto
      productoInput.value = producto;
      const precioNum = parseInt(precio.replace(/\./g, ""));
      precioInput.value = "$" + precioNum.toLocaleString("es-CO");

    } else {
      // Caso: compra desde el carrito
      productosContainer.innerHTML = ""; // limpiar

      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      let total = 0;

      carrito.forEach((prod, i) => {
        total += prod.precio * prod.cantidad;

        const inputProd = document.createElement("input");
        inputProd.type = "text";
        inputProd.name = `Producto_${i + 1}`;
        inputProd.readOnly = true;
        inputProd.value = `${prod.nombre} (x${prod.cantidad})`;
        productosContainer.appendChild(inputProd);

        const inputPrecio = document.createElement("input");
        inputPrecio.type = "text";
        inputPrecio.name = `Precio_${i + 1}`;
        inputPrecio.readOnly = true;
        inputPrecio.value = "$" + (prod.precio * prod.cantidad).toLocaleString("es-CO");
        productosContainer.appendChild(inputPrecio);
      });

      totalContainer.style.display = "block";
      totalInput.value = "$" + total.toLocaleString("es-CO");
    }

    // Vaciar carrito después del envío si es desde carrito
    document.getElementById("pedidoForm").addEventListener("submit", () => {
      if (!producto || !precio) {
        localStorage.removeItem("carrito");
      }
    });
  </script>
</body>
</html>
