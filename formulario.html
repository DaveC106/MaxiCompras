<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Compra</title>
  <link rel="stylesheet" href="styleform.css">
</head>
<body>

  <form id="form-compra" class="formulario">
    <h2>Finalizar Compra</h2>

    <section>
      <h3>Contacto</h3>
      <input type="text" name="contacto" placeholder="Email o número de teléfono móvil" required>
    </section>

    <section>
      <h3>Entrega</h3>
      <select name="pais" required>
        <option value="">País / Región</option>
        <option value="Colombia">Colombia</option>
        <option value="México">México</option>
        <option value="Argentina">Argentina</option>
        <!-- Agrega más países -->
      </select>

      <div class="fila">
        <input type="text" name="nombre" placeholder="Nombre (opcional)">
        <input type="text" name="apellido" placeholder="Apellidos">
      </div>
      
      <input type="text" name="direccion" placeholder="Dirección" required>
      <input type="text" name="apartamento" placeholder="Casa, apartamento, etc. (opcional)">

      <div class="fila">
        <input type="text" name="ciudad" placeholder="Ciudad" required>
        <input type="text" name="estado" placeholder="Provincia / Estado" required>
        <input type="text" name="codigo_postal" placeholder="Código postal (opcional)">
      </div>
    </section>

    <section>
      <h3>Método de envío</h3>
      <label class="envio">
        <input type="radio" name="envio" value="standard" checked>
        Standard - GRATIS
      </label>
    </section>

    <section>
      <h3>Producto</h3>
      <input type="text" name="producto" id="nombre-producto" readonly>
    </section>

    <button type="submit">Realizar pedido</button>
  </form>

  <script>
    // Obtener el nombre del producto desde el query param
    const params = new URLSearchParams(window.location.search);
    const producto = params.get("producto");
    if(producto) document.getElementById("nombre-producto").value = decodeURIComponent(producto);

    // Enviar a Google Sheets con Fetch
    document.getElementById("form-compra").addEventListener("submit", function(e) {
      e.preventDefault();
      const data = new FormData(this);

      fetch("https://script.google.com/macros/s/TU_SCRIPT_ID/exec", {
        method: "POST",
        body: data
      }).then(res => {
        if (res.ok) alert("Pedido enviado correctamente");
        else alert("Error al enviar el pedido");
        this.reset();
      });
    });
  </script>

</body>
</html>
