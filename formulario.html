<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Compra</title>
  <link rel="stylesheet" href="styleform.css" />
</head>
<body>
  <div class="form-container">
    <h2>Finaliza tu compra</h2>

    <form action="https://formsubmit.co/ventasmaxikompras@gmail.com" method="POST">
      <!-- Cambia "tucorreo@gmail.com" por tu correo real -->

      <label for="correo">Correo electrónico o teléfono</label>
      <input type="email" id="correo" name="contacto" required>

      <h3>Entrega</h3>

      <label for="pais">País / Región</label>
      <select id="pais" name="pais" required>
        <option value="">Selecciona tu país</option>
        <option value="Colombia">Colombia</option>
        <option value="México">México</option>
        <option value="Argentina">Argentina</option>
        <option value="Chile">Chile</option>
        <option value="Perú">Perú</option>
      </select>

      <div class="input-group">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre">
        </div>
        <div>
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido">
        </div>
      </div>
      <label for="producto">Producto</label>
<input type="text" id="producto" name="producto" readonly>

<label for="precio">Precio</label>
<input type="text" id="precio" name="precio" readonly>

      <label for="direccion">Dirección</label>
      <input type="text" id="direccion" name="direccion" required>

      <label for="apartamento">Apartamento / Casa (opcional)</label>
      <input type="text" id="apartamento" name="apartamento">

      <div class="input-group">
        <div>
          <label for="ciudad">Ciudad</label>
          <input type="text" id="ciudad" name="ciudad">
        </div>
        <div>
          <label for="departamento">Departamento / Estado</label>
          <input type="text" id="departamento" name="departamento">
        </div>
        <div>
          <label for="codigo_postal">Código Postal</label>
          <input type="text" id="codigo_postal" name="codigo_postal">
        </div>
      </div>

      <!-- Opcional: redirigir después del envío -->
      <input type="hidden" name="_next" value="https://maxicomprass.store/gracias.html">
      <input type="hidden" name="_captcha" value="false">

      <button type="submit">Enviar pedido</button>
    </form>
  </div>

  <script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById("producto").value = params.get("producto") || "";
  document.getElementById("precio").value = params.get("precio") || "";
</script>
</body>
</html>
