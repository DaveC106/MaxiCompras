<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Compra</title>
  <link rel="stylesheet" href="styleform.css" />
</head>
<body>
  <div class="form-container">
    <h2>Finaliza tu compra</h2>
    <form id="formularioCompra">
      <label for="correo">Correo electrónico o teléfono</label>
      <input type="email" id="correo" required>

      <h3>Entrega</h3>

      <label for="pais">País / Región</label>
      <select id="pais" required>
        <option value="">Selecciona tu país</option>
        <option value="Colombia">Colombia</option>
        <option value="México">México</option>
        <option value="Argentina">Argentina</option>
        <option value="Chile">Chile</option>
        <option value="Perú">Perú</option>
        <!-- Puedes añadir más países -->
      </select>

      <div class="input-group">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre">
        </div>
        <div>
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido">
        </div>
      </div>

      <label for="direccion">Dirección</label>
      <input type="text" id="direccion" required>

      <label for="apartamento">Apartamento / Casa (opcional)</label>
      <input type="text" id="apartamento">

      <div class="input-group">
        <div>
          <label for="ciudad">Ciudad</label>
          <input type="text" id="ciudad">
        </div>
        <div>
          <label for="departamento">Departamento / Estado</label>
          <input type="text" id="departamento">
        </div>
        <div>
          <label for="codigo_postal">Código Postal</label>
          <input type="text" id="codigo_postal">
        </div>
      </div>

      <button type="submit">Enviar pedido</button>
    </form>
  </div>

  <script>
    document.getElementById("formularioCompra").addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        correo: document.getElementById("correo").value,
        pais: document.getElementById("pais").value,
        nombre: document.getElementById("nombre").value,
        apellido: document.getElementById("apellido").value,
        direccion: document.getElementById("direccion").value,
        apartamento: document.getElementById("apartamento").value,
        ciudad: document.getElementById("ciudad").value,
        departamento: document.getElementById("departamento").value,
        codigo_postal: document.getElementById("codigo_postal").value,
      };

      fetch("https://script.google.com/macros/s/AKfycbytQPgFnJJnA-VclJYHhwc_Ar7sAaXrE2x4fGu1my2GepAW5k_mV-YKcmOw20sFGjpmhA/exec", {
        method: "POST",
        body: JSON.stringify(data),
        headers: {
          "Content-Type": "application/json"
        }
      }).then(res => {
        alert("✅ Pedido enviado correctamente");
        document.getElementById("formularioCompra").reset();
      }).catch(err => {
        alert("❌ Error al enviar pedido");
        console.error(err);
      });
    });
  </script>
</body>
</html>
