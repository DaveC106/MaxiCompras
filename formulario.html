<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Compra</title>
  <link rel="stylesheet" href="styleform.css" />
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">
    <span><img src="img/camion.png" alt="Envío" class="icono"> Envío Gratis a todo Colombia</span>
    <span><img src="img/telefono.png" alt="WhatsApp" class="icono"> Asesoramiento vía WhatsApp</span>
    <span><img src="img/importadores.png" alt="Calidad" class="icono"> Somos Importadores</span>
  </div>

  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo">
      <h1>MaxiCompras</h1>
    </div>
    <div class="icons">
      <img src="./img/search.png" alt="Buscar" />
      <a href="cart.html"><img src="./img/cart.png" alt="Carrito" /></a>
    </div>
  </header>

  <div class="form-container">
    <h2>Finaliza tu compra</h2>
    <form action="https://formsubmit.co/ventasmaxikompras@gmail.com" method="POST">
      
      <!-- Sección 1: Contacto -->
      <h3>1. Contacto</h3>

      <label for="email">Correo electrónico *</label>
      <input type="email" id="email" name="CorreoElectronico" required>

      <label for="telefono">Número Teléfono *</label>
      <input type="tel" id="telefono" name="Telefono" required>

      <label for="telefono_confirmar">Confirmar Teléfono *</label>
      <input type="tel" id="telefono_confirmar" name="ConfirmarTelefono" required>

      <!-- Sección 2: Entrega -->
      <h3>2. Entrega</h3>

      <label for="nombre">Nombre *</label>
      <input type="text" id="nombre" name="Nombre" required>

      <label for="apellido">Apellido *</label>
      <input type="text" id="apellido" name="Apellido" required>

      <label for="pais">País *</label>
      <select id="pais" name="Pais" required>
        <option value="">Seleccione...</option>
        <option value="Colombia">Colombia</option>
      </select>

      <label for="estado">Estado / Región *</label>
      <input type="text" id="estado" name="EstadoRegion" required>

      <label for="ciudad">Ciudad *</label>
      <input type="text" id="ciudad" name="Ciudad" required>

      <label for="direccion">Dirección *</label>
      <input type="text" id="direccion" name="Direccion" required>

      <label for="apartamento">Apartamento / Casa (opcional)</label>
      <input type="text" id="apartamento" name="ApartamentoCasa">

      <label for="ccnit">CC o NIT *</label>
      <input type="text" id="ccnit" name="CCoNIT" required>

      <label for="facturacionIgual">
        <input type="checkbox" id="facturacionIgual" name="FacturacionIgualEnvio" checked>
        Dirección de Facturación igual a la de Envío
      </label>

      <!-- Campos por default para 1 solo producto -->
      <label for="producto">Producto</label>
      <input type="text" id="producto" name="Producto" readonly>

      <label for="precio">Precio</label>
      <input type="text" id="precio" name="Precio" readonly>

      <!-- Resumen total si hay varios productos -->
      <div id="resumen-total" class="carrito-resumen" style="display: none;">
        <p><strong>Total a pagar:</strong> <span id="monto-total"></span></p>
      </div>

      <!-- Sección 3: Pago -->
      <h3>3. Pago</h3>

      <label>
        <input type="radio" name="MetodoPago" value="Contraentrega" checked> Pago Contraentrega
      </label><br>

      <!-- Configuración FormSubmit -->
      <input type="hidden" name="_next" value="https://maxicomprass.store">
      <input type="hidden" name="_captcha" value="false">

      <button type="submit" class="btn-finalizar">Enviar Pedido</button>
    </form>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const producto = urlParams.get("producto");
    const precio = urlParams.get("precio");

    const productoInput = document.getElementById("producto");
    const precioInput = document.getElementById("precio");

    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    if (carrito.length > 1) {
      productoInput.remove();
      precioInput.remove();

      const form = document.querySelector("form");
      const referencia = form.querySelector("h3:nth-of-type(2)");
      let total = 0;

      carrito.forEach((item, index) => {
        const prodLabel = document.createElement("label");
        prodLabel.textContent = `Producto ${index + 1}`;
        form.insertBefore(prodLabel, referencia);

        const prodInput = document.createElement("input");
        prodInput.type = "text";
        prodInput.name = `Producto_${index + 1}`;
        prodInput.readOnly = true;
        prodInput.value = `${item.nombre} x${item.cantidad}`;
        form.insertBefore(prodInput, referencia);

        const precioLabel = document.createElement("label");
        precioLabel.textContent = `Precio ${index + 1}`;
        form.insertBefore(precioLabel, referencia);

        const precioInput = document.createElement("input");
        precioInput.type = "text";
        precioInput.name = `Precio_${index + 1}`;
        precioInput.readOnly = true;
        const subtotal = item.precio * item.cantidad;
        total += subtotal;
        precioInput.value = `$${subtotal.toLocaleString("es-CO")}`;
        form.insertBefore(precioInput, referencia);
      });

      document.getElementById("resumen-total").style.display = "block";
      document.getElementById("monto-total").textContent = `$${total.toLocaleString("es-CO")}`;
    } else {
      if (producto) productoInput.value = producto;
      if (precio) precioInput.value = precio;
    }
  </script>
</body>
</html>
