<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Compra</title>
  <link rel="stylesheet" href="styleform.css" />
</head>
<body>
  <!-- Barra superior -->
  <div class="top-bar">
    <span><img src="img/camion.png" alt="Envío" class="icono"> Envío Gratis a todo Colombia</span>
    <span><img src="img/telefono.png" alt="WhatsApp" class="icono"> Asesoramiento via Whatsapp</span>
    <span><img src="img/importadores.png" alt="Calidad" class="icono"> Somos Importadores</span>
  </div>

  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo">
      <h1>MaxiCompras</h1>
    </div>
    <div class="icons">
      <img src="./img/search.png" alt="Buscar" />
      <img src="./img/user.png" alt="Usuario" />
      <img src="./img/cart.png" alt="Carrito" />
    </div>
  </header>

  <div class="form-container">
    <h2>Finaliza tu compra</h2>
    <form action="https://formsubmit.co/ventasmaxikompras@gmail.com" method="POST">
      
      <!-- Sección 1: Contacto -->
<h3>1. Contacto</h3>
<label for="email">Correo electrónico *</label>
<input type="email" id="email" name="correo" required>

<label for="telefono">Número Teléfono *</label>
<input type="tel" id="telefono" name="telefono" required>

<label for="telefono_confirmar">Confirmar Teléfono *</label>
<input type="tel" id="telefono_confirmar" name="telefono-confirmar" required>

<!-- Sección 2: Entrega -->
<h3>2. Entrega</h3>
<label for="nombre">Nombre *</label>
<input type="text" id="nombre" name="nombre" required>

<label for="apellido">Apellido *</label>
<input type="text" id="apellido" name="apellido" required>

<label for="pais">País *</label>
<select id="pais" name="pais" required>
  <option value="">Seleccione...</option>
  <option value="Colombia">Colombia</option>
</select>

<label for="estado">Estado / Región *</label>
<input type="text" id="estado" name="estado" required>

<label for="ciudad">Ciudad *</label>
<input type="text" id="ciudad" name="ciudad" required>

<label for="direccion">Dirección *</label>
<input type="text" id="direccion" name="direccion" required>

<label for="apartamento">Apartamento / Casa (opcional)</label>
<input type="text" id="apartamento" name="apartamento">

<label for="ccnit">CC o NIT *</label>
<input type="text" id="ccnit" name="cc-nit" required>

<label>
  <input type="checkbox" name="facturacion-igual" checked>
  Dirección de Facturación igual a la de Envío
</label>

<label for="producto">Producto</label>
<input type="text" id="producto" name="producto" readonly>

<label for="precio">Precio</label>
<input type="text" id="precio" name="precio" readonly>

<!-- Sección 3: Pago -->
<h3>3. Pago</h3>
<label><input type="radio" name="metodo-pago" value="Contraentrega" checked> Pago Contraentrega</label><br>
<label><input type="radio" name="metodo-pago" value="Davivienda"> Transferencia DAVIVIENDA</label><br>
<label><input type="radio" name="metodo-pago" value="PSE"> PSE / Tarjeta / Transferencia</label><br>
<label><input type="radio" name="metodo-pago" value="Nequi"> Pago por NEQUI</label><br>
<label><input type="radio" name="metodo-pago" value="ADDI"> Crédito (ADDI)</label>

<!-- Configuración FormSubmit -->
<input type="hidden" name="_next" value="https://maxikomprass.store">
<input type="hidden" name="_captcha" value="false">

      <button type="submit">Enviar Pedido</button>
    </form>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const producto = urlParams.get("producto");
    const precio = urlParams.get("precio");

    if(producto) document.getElementById("producto").value = producto;
    if(precio) document.getElementById("precio").value = precio;
  </script>
</body>
</html>
