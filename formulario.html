<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Compra</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="styleform.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <span><img src="img/camion.png" alt="Envío" class="icono"> Envío Gratis a todo Colombia</span>
    <span><img src="img/telefono.png" alt="WhatsApp" class="icono"> Asesoramiento vía Whatsapp</span>
    <span><img src="img/importadores.png" alt="Calidad" class="icono"> Somos Importadores</span>
  </div>

 <!-- Encabezado -->
<header class="main-header">
  <a href="index.html">
    <div class="logo">
      <img src="img/logomaxicompras.png" alt="Logo MaxiCompras" />
    </div>
  </a>
  <div class="icons">
    <img src="img/search.png" alt="Buscar" />
    <div class="carrito-icono">
      <img src="img/cart.png" alt="Carrito" />
      <span class="contador-carrito" id="contadorCarrito"></span>
    </div>
  </div>
</header>

  
  <div class="form-container">
    <h2>Finaliza tu compra</h2>
    <form id="pedidoForm" action="https://formsubmit.co/ventasmaxikompras@gmail.com" method="POST">
      
      <h3>1. Contacto</h3>
      <label for="email">Correo electrónico *</label>
      <input type="email" id="email" name="CorreoElectronico" required>

      <label for="telefono">Número Teléfono *</label>
      <input type="tel" id="telefono" name="Telefono" required>

      <label for="telefono_confirmar">Confirmar Teléfono *</label>
      <input type="tel" id="telefono_confirmar" name="ConfirmarTelefono" required>

      <h3>2. Entrega</h3>
      <label for="nombre">Nombre *</label>
      <input type="text" id="nombre" name="Nombre" required>

      <label for="apellido">Apellido *</label>
      <input type="text" id="apellido" name="Apellido" required>

      <label for="pais">País *</label>
      <select id="pais" name="Pais" required>
        <option value="">Seleccione...</option>
        <option value="Colombia">Colombia</option>
      </select>

      <label for="estado">Estado / Región *</label>
      <input type="text" id="estado" name="EstadoRegion" required>

      <label for="ciudad">Ciudad *</label>
      <input type="text" id="ciudad" name="Ciudad" required>

      <label for="direccion">Dirección *</label>
      <input type="text" id="direccion" name="Direccion" required>

      <label for="apartamento">Apartamento / Casa (opcional)</label>
      <input type="text" id="apartamento" name="ApartamentoCasa">

      <label for="ccnit">CC o NIT *</label>
      <input type="text" id="ccnit" name="CCoNIT" required>

      <label>
        <input type="checkbox" id="facturacionIgual" name="FacturacionIgualEnvio" checked>
        Dirección de Facturación igual a la de Envío
      </label>

      <div id="productos-container">
        <label for="producto">Producto</label>
        <input type="text" id="producto" name="Producto" readonly>

        <label for="precio">Precio</label>
        <input type="text" id="precio" name="Precio" readonly>
      </div>

      <div id="total-container" style="display:none;">
        <label for="total">Total</label>
        <input type="text" id="total" name="Total" readonly>
      </div>

      <h3>3. Pago</h3>
      <label>
        <input type="radio" name="MetodoPago" value="Contraentrega" checked> Pago Contraentrega
      </label>

      <input type="hidden" name="_next" value="https://maxicomprass.store">
      <input type="hidden" name="_captcha" value="false">

      <button type="submit">Enviar Pedido</button>
    </form>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const producto = urlParams.get("producto");
    const precio = urlParams.get("precio");

    const productoInput = document.getElementById("producto");
    const precioInput = document.getElementById("precio");
    const productosContainer = document.getElementById("productos-container");
    const totalContainer = document.getElementById("total-container");
    const totalInput = document.getElementById("total");

    if (producto && precio) {
      productoInput.value = producto;
      const precioNum = parseInt(precio.replace(/\./g, ""));
      precioInput.value = "$" + precioNum.toLocaleString("es-CO");
    } else {
      productosContainer.innerHTML = "";
      const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      let total = 0;

      carrito.forEach((prod, i) => {
        total += prod.precio * prod.cantidad;

        const inputProd = document.createElement("input");
        inputProd.type = "text";
        inputProd.name = `Producto_${i + 1}`;
        inputProd.readOnly = true;
        inputProd.value = `${prod.nombre} (x${prod.cantidad})`;
        productosContainer.appendChild(inputProd);

        const inputPrecio = document.createElement("input");
        inputPrecio.type = "text";
        inputPrecio.name = `Precio_${i + 1}`;
        inputPrecio.readOnly = true;
        inputPrecio.value = "$" + (prod.precio * prod.cantidad).toLocaleString("es-CO");
        productosContainer.appendChild(inputPrecio);
      });

      totalContainer.style.display = "block";
      totalInput.value = "$" + total.toLocaleString("es-CO");
    }

    document.getElementById("pedidoForm").addEventListener("submit", () => {
      if (!producto || !precio) {
        localStorage.removeItem("carrito");
      }
    });
  </script>

  <!-- Script: rotación top-bar móvil -->
  <script>
    const spans = document.querySelectorAll(".top-bar span");
    let index = 0;

    function mostrarSiguiente() {
      spans.forEach((s, i) => s.classList.remove("activo"));
      spans[index].classList.add("activo");
      index = (index + 1) % spans.length;
    }

    if (window.innerWidth <= 768) {
      mostrarSiguiente();
      setInterval(mostrarSiguiente, 4000);
    }
  </script>

<!-- Script: Buscador -->
<div id="modal-busqueda" class="modal-busqueda oculto">
  <div class="contenido-busqueda">
    <button id="cerrar-busqueda" class="cerrar">✖</button>
    <input type="text" id="input-modal" placeholder="Buscar producto..." />
    <div id="resultados-modal" class="grid-productos"></div>
  </div>
</div>

<script>
  const modal = document.getElementById("modal-busqueda");
  const abrirModal = document.querySelector('img[alt="Buscar"]');
  const cerrarModal = document.getElementById("cerrar-busqueda");
  const inputModal = document.getElementById("input-modal");
  const resultadosModal = document.getElementById("resultados-modal");

  let productosCargados = [];

  fetch("productos.json")
    .then(res => res.json())
    .then(productos => {
      productosCargados = productos;
    });

  abrirModal.addEventListener("click", () => {
    modal.classList.remove("oculto");
    inputModal.focus();
  });

  cerrarModal.addEventListener("click", () => {
    modal.classList.add("oculto");
    inputModal.value = "";
    resultadosModal.innerHTML = "";
  });

  inputModal.addEventListener("input", () => {
    const texto = inputModal.value.toLowerCase();
    resultadosModal.innerHTML = "";

    const filtrados = productosCargados.filter(p =>
      p.nombre.toLowerCase().includes(texto)
    );

    if (filtrados.length === 0) {
      resultadosModal.innerHTML = "<p>No se encontraron productos.</p>";
      return;
    }

    filtrados.forEach(producto => {
      const precioAnterior = producto.precio_anterior || Math.round(producto.precio * 1.5);
      const descuento = Math.round(100 - (producto.precio / precioAnterior) * 100);

      const div = document.createElement("div");
      div.className = "producto-card";
      div.innerHTML = `
        <a href="producto.html?slug=${producto.slug}">
          <div class="etiqueta-descuento">↓ Ahorrar ${descuento}%</div>
          <img src="${producto.imagenes[0]}" alt="${producto.nombre}" class="producto-img" />
          <h3 class="nombre-producto">${producto.nombre}</h3>
          <div class="precio">
            <span class="precio-actual">$${producto.precio.toLocaleString('es-CO')}</span>
            <span class="precio-anterior">$${precioAnterior.toLocaleString('es-CO')}</span>
          </div>
          <div class="estrellas">★★★★★ <span class="valoracion">(5)</span></div>
        </a>
      `;
      resultadosModal.appendChild(div);
    });
  });
</script>

<!-- Script: Mini carrito -->
<div id="mini-carrito" class="modal-carrito oculto">
  <div class="contenido-carrito">
    <h2>Tu Carrito</h2>
    <div id="mini-carrito-items"></div>
    <div class="mini-carrito-footer">
      <button onclick="window.location.href='cart.html'" class="btn-ir-carrito">Ir al carrito</button>
    </div>
  </div>
</div>
<div id="fondo-oscuro-carrito" class="fondo-oscuro oculto"></div>

<script>
  const iconoCarrito = document.querySelector('img[alt="Carrito"]');
  const miniCarrito = document.getElementById("mini-carrito");
  const fondoCarrito = document.getElementById("fondo-oscuro-carrito");
  const contenedorMini = document.getElementById("mini-carrito-items");

  iconoCarrito.addEventListener("click", () => {
    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    contenedorMini.innerHTML = "";

    if (carrito.length === 0) {
      contenedorMini.innerHTML = "<p>Tu carrito está vacío.</p>";
    } else {
      carrito.forEach(producto => {
        const div = document.createElement("div");
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;">
            <img src="${producto.imagen}" alt="" style="width:50px;height:50px;object-fit:cover;border-radius:5px;">
            <div>
              <p style="margin:0;">${producto.nombre}</p>
              <small>$${producto.precio.toLocaleString('es-CO')} x ${producto.cantidad}</small>
            </div>
          </div>`;
        contenedorMini.appendChild(div);
      });
    }

    miniCarrito.classList.remove("oculto");
    fondoCarrito.classList.remove("oculto");
  });

  fondoCarrito.addEventListener("click", () => {
    miniCarrito.classList.add("oculto");
    fondoCarrito.classList.add("oculto");
  });
</script>

<!-- Script: Contador de carrito -->
<script>
  function actualizarContadorCarrito() {
    const contador = document.getElementById("contadorCarrito");
    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    const total = carrito.reduce((acc, prod) => acc + prod.cantidad, 0);

    if (total > 0) {
      contador.textContent = total;
      contador.style.display = "inline-block";
    } else {
      contador.style.display = "none";
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    actualizarContadorCarrito();
  });
</script>


</body>
</html>
