<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxikompras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">
    <span>🚚 Envío Gratis a todo Colombia</span>
    <span>📞 Atención por WhatsApp</span>
    <span>💯 Calidad Garantizada</span>
  </div>

  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo">
      <img src="/img/logo.png" alt="Logo" />
      <h1>Dropkiller <span>Shop</span></h1>
    </div>
    <div class="icons">
      <img src="./img/search.png" alt="Buscar" />
      <img src="./img/user.png" alt="Usuario" />
      <img src="./img/cart.png" alt="Carrito" />
    </div>
  </header>

  <!-- Banner -->
  <section class="hero">
    <div class="hero-texto">
      <h2>¡LO MEJOR, AL MEJOR PRECIO!</h2>
      <p>Compra hoy y recibe calidad premium con envío rápido.</p>
      <a href="#" class="btn">Comprar ahora</a>
    </div>
    <div class="hero-img">
      <img src="./img/banner.png" alt="Banner principal">
    </div>
  </section>
