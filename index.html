<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxikompras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">
    <span>🚚 Envío Gratis a todo Colombia</span>
    <span>📞 Asesoramiento vía Whatsapp</span>
    <span>📦 Somos Importadores</span>
  </div>

  <!-- Encabezado principal -->
  <header class="main-header">
    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/891/891462.png" alt="logo" />
      <h1>Dropkiller <span>Shop</span></h1>
    </div>
    <div class="icons">
      <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" alt="Buscar" />
      <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" alt="Usuario" />
      <img src="https://cdn-icons-png.flaticon.com/512/833/833314.png" alt="Carrito" />
    </div>
  </header>

  <!-- Banner principal -->
  <section class="hero">
    <div class="hero-texto">
      <h2>¡LLÉVATE LO MEJOR,<br> AL MEJOR PRECIO!</h2>
      <p>Compra hoy y recibe calidad premium con envío rápido. ¡No te lo puedes perder!</p>
      <a href="#" class="btn">Compra Ahora</a>
    </div>
    <div class="hero-img">
      <img src="https://i.postimg.cc/3x3QzSGq/banner.png" alt="Banner principal">
    </div>
  </section>

</body>
</html>
