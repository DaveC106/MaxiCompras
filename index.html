<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxikompras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">
    <span>🚚 Envío Gratis a todo Colombia</span>
    <span>📞 Atención por WhatsApp</span>
    <span>💯 Calidad Garantizada</span>
  </div>

  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo">
      <img src="/img/logo.png" alt="Logo" />
      <h1>Dropkiller <span>Shop</span></h1>
    </div>
    <div class="icons">
      <img src="./img/search.png" alt="Buscar" />
      <img src="./img/user.png" alt="Usuario" />
      <img src="./img/cart.png" alt="Carrito" />
    </div>
  </header>

  <!-- Banner -->
  <section class="hero">
    <div class="hero-img">
      <img src="./img/banner.png" alt="Banner principal">
    </div>
  </section>
  <!-- Sección Nuestras Categorías -->
<section class="categorias">
  <h2>Nuestras Categorías</h2>
  <div class="grid-categorias">
    <div class="categoria">
      <img src="./img/cat-accesorios.png" alt="Accesorios">
      <p>Accesorios</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-bienestar.png" alt="Bienestar">
      <p>Bienestar</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-cocina.png" alt="Cocina">
      <p>Cocina</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-hogar.png" alt="Hogar">
      <p>Hogar</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-tecnologia.png" alt="Tecnología">
      <p>Tecnología</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-vehiculos.png" alt="Vehículos">
      <p>Vehículos</p>
      <span class="linea"></span>
    </div>
  </div>
</section>
