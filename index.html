<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxikompras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">
    <span>🚚 Envío Gratis a todo Colombia</span>
    <span>📞 Atención por WhatsApp</span>
    <span>💯 Calidad Garantizada</span>
  </div>

  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo">
      <img src="/img/logo.png" alt="Logo" />
      <h1>Dropkiller <span>Shop</span></h1>
    </div>
    <div class="icons">
      <img src="./img/search.png" alt="Buscar" />
      <img src="./img/user.png" alt="Usuario" />
      <img src="./img/cart.png" alt="Carrito" />
    </div>
  </header>

  <!-- Banner -->
  <section class="hero">
    <div class="hero-img">
      <img src="./img/banner.png" alt="Banner principal">
    </div>
  </section>
  <!-- Sección Nuestras Categorías -->
<section class="categorias">
  <h2>Nuestras Categorías</h2>
  <div class="grid-categorias">
    <div class="categoria">
      <img src="./img/cat-accesorios.png" alt="Accesorios">
      <p>Accesorios</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-bienestar.png" alt="Bienestar">
      <p>Bienestar</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-cocina.png" alt="Cocina">
      <p>Cocina</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-hogar.png" alt="Hogar">
      <p>Hogar</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-tecnologia.png" alt="Tecnología">
      <p>Tecnología</p>
      <span class="linea"></span>
    </div>
    <div class="categoria">
      <img src="./img/cat-vehiculos.png" alt="Vehículos">
      <p>Vehículos</p>
      <span class="linea"></span>
    </div>
  </div>
</section>
<section class="productos">
  <h2>Productos Destacados</h2>

  <!-- ACÁ lo ponés -->
  <div class="grid-productos"></div>

</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJhiPSI2O5dxqDnP1XgrpMy0X6O3nzjF8",
    authDomain: "maxicompras-18083.firebaseapp.com",
    projectId: "maxicompras-18083",
    storageBucket: "maxicompras-18083.firebasestorage.app",
    messagingSenderId: "926294048252",
    appId: "1:926294048252:web:f9472ec34e04f5bfef0679"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const contenedor = document.querySelector(".grid-productos"); // Asegúrate que tu HTML tenga esta clase

  async function cargarProductos() {
    const querySnapshot = await getDocs(collection(db, "productos"));
    querySnapshot.forEach((doc) => {
      const producto = doc.data();
      const html = `
        <div class="producto">
          <img src="${producto.imagen}" alt="${producto.nombre}">
          <h3>${producto.nombre}</h3>
          <p class="precio">$${producto.precio.toLocaleString()}</p>
          <button>Añadir al carrito</button>
        </div>
      `;
      contenedor.innerHTML += html;
    });
  }

  cargarProductos();
</script>
