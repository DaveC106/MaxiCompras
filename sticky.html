<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Sidebar | Flexbox CSS Tutorial</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        header{
            background-color: #40aded;
            text-align: center;
            padding: 6rem 0;
        }

        h1{
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
        }

        .left{
            width: 300px;
            height: 450px;
            background: #92d2fa7d;
            position: sticky;
            border-radius: 1rem;
            top: 50px;
        }

        .right{
            width: 750px;
        }

        .right > div{
            height: 250px;
            background-color: #a1a1a175;
            border-radius: 1rem;
        }

        .right > div + div{
            margin-top: 50px;
        }

        .container{
            display: flex;
            margin: 3rem 5rem;
            gap: 7rem;
        }

        .container::before, .container::after{
            content: "";
            display: table;
            clear: both;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sticky Sidebar on Scroll</h1>
    </header>
    <div class="container">
        <div class="left">
            <img src="images/PRIMERA-MEJORADA.png" alt="Picador eléctrico" class="product-image" style="width: 100%; height: auto; border-radius: 1rem;" />
        </div>
        <div class="right">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
</body>
</html>
