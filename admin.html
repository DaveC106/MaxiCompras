<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - MaxiCompras</title>
</head>
<body>
  <h1>Agregar producto</h1>

  <form id="formulario">
    <input type="text" placeholder="Nombre del producto" id="nombre" required><br><br>
    <input type="number" placeholder="Precio (sin puntos ni $)" id="precio" required><br><br>
    <input type="text" placeholder="URL de imagen" id="imagen" required><br><br>
    <input type="text" placeholder="Categoría" id="categoria" required><br><br>
    <button type="submit">Guardar producto</button>
  </form>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJhiPSI2O5dxqDnP1XgrpMy0X6O3nzjF8",
    authDomain: "maxicompras-18083.firebaseapp.com",
    projectId: "maxicompras-18083",
    storageBucket: "maxicompras-18083.firebasestorage.app",
    messagingSenderId: "926294048252",
    appId: "1:926294048252:web:f9472ec34e04f5bfef0679"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("formulario");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const precio = parseInt(document.getElementById("precio").value);
    const imagen = document.getElementById("imagen").value;
    const categoria = document.getElementById("categoria").value;

    try {
      await addDoc(collection(db, "productos"), {
        nombre,
        precio,
        imagen,
        categoria
      });
      alert("✅ Producto agregado con éxito");
      form.reset();
    } catch (error) {
      alert("❌ Error al guardar: " + error.message);
    }
  });
</script>
</body>
</html>
