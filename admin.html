<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - MaxiCompras</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #fff6ee;
      padding: 30px;
    }

    h1 {
      color: #ff6a00;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 500px;
    }

    input, textarea, button, label {
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #ff6a00;
      color: white;
      border: none;
      cursor: pointer;
    }

    #preview-imgs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    #preview-imgs img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Agregar producto</h1>

  <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre del producto" required>
    <textarea id="descripcion" placeholder="Descripción del producto" required></textarea>
    <input type="number" id="precio" placeholder="Precio (sin puntos ni $)" required>
    <input type="text" id="categoria" placeholder="Categoría" required>

    <label>
      ¿Destacado?
      <input type="checkbox" id="destacado">
    </label>

    <label>
      Imágenes del producto:
      <input type="file" id="imagenes" multiple accept="image/*">
    </label>

    <button type="submit">Guardar producto</button>
  </form>
  <h2 style="margin-top: 40px;">Productos actuales</h2>
<table id="tabla-productos" border="1" cellspacing="0" cellpadding="8" style="background:#fff;width:100%;text-align:left;">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Categoría</th>
      <th>Destacado</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

  <div id="preview-imgs"></div>
<script type="module">
  const form = document.getElementById("formulario");
  const inputImgs = document.getElementById("imagenes");
  const previewContainer = document.getElementById("preview-imgs");

  inputImgs.addEventListener("change", () => {
    previewContainer.innerHTML = "";
    for (const file of inputImgs.files) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.createElement("img");
        img.src = e.target.result;
        previewContainer.appendChild(img);
      };
      reader.readAsDataURL(file);
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const descripcion = document.getElementById("descripcion").value;
    const precio = parseInt(document.getElementById("precio").value);
    const categoria = document.getElementById("categoria").value;
    const destacado = document.getElementById("destacado").checked;

    const producto = {
      nombre,
      descripcion,
      precio,
      categoria,
      imagenes: [], // Aquí luego conectamos con subida local si quieres
      destacado,
      timestamp: new Date()
    };

    try {
      const res = await fetch("http://localhost:3000/productos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(producto)
      });

      if (!res.ok) throw new Error("No se pudo guardar");

      alert("✅ Producto guardado en JSON local!");
      form.reset();
      previewContainer.innerHTML = "";
      cargarTabla(); // Recargar la tabla con los nuevos datos
    } catch (err) {
      alert("❌ Error: " + err.message);
    }
  });

  async function cargarTabla() {
    const tabla = document.querySelector("#tabla-productos tbody");
    tabla.innerHTML = "";

    try {
      const res = await fetch("http://localhost:3000/productos");
      const productos = await res.json();

      productos.forEach((producto, index) => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${producto.nombre}</td>
          <td>$${producto.precio.toLocaleString()}</td>
          <td>${producto.categoria}</td>
          <td>${producto.destacado ? "✅" : "❌"}</td>
          <td><button onclick="eliminarProducto(${index})">🗑️</button></td>
        `;
        tabla.appendChild(fila);
      });
    } catch (err) {
      tabla.innerHTML = "<tr><td colspan='5'>Error al cargar productos</td></tr>";
    }
  }

  // Más adelante programamos esta función
  window.eliminarProducto = async function (index) {
    alert("Eliminar desde JSON aún no está implementado");
  };

  cargarTabla();
</script>
 
 
</body>
</html>
